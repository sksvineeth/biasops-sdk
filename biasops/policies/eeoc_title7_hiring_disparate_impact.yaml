# ============================================================
# BiasOps Policy: EEOC Title VII — Hiring Disparate Impact
# Version: 2.0.0
# ============================================================
#
# WHAT CHANGED FROM v1.0.0
# -------------------------
# v1.0.0 had a flat policy_logic block — one numeric threshold
# and four unverifiable booleans with no metric_id, no type,
# no stage binding, no severity, no rule structure.
# The engine could not read it.
#
# v2.0.0 migrates to the same rules-array schema as
# eu_ai_act_high_risk_system_v2.yaml so a single engine
# can evaluate any policy file without code changes.
#
# KEY DESIGN DECISION: metric_id
# --------------------------------
# Every numeric rule has a metric_id that maps exactly to
# the key produced by adapter.py from fairlearn. This is
# the binding between policy and computation. If the key
# doesn't match, the rule is skipped with a warning.
#
# RULE TYPES IN THIS FILE
# -------------------------
# numeric     → adapter.py computes it, evaluator.py checks it
# attestation → engine skips in MVP, generates checklist item
# conditional_numeric → numeric only when condition is met
# ============================================================

id: EEOC-TITLE7-001
name: EEOC Title VII - Hiring Disparate Impact
version: 2.0.0
supersedes: 1.0.0
domain: hr-employment
jurisdiction: US
risk_level: CRITICAL
enforcement_mode: block
maintained_by: BiasOps Core Team
last_reviewed: "2026-03-24"

applies_to:
  - hiring_models
  - resume_screening
  - candidate_ranking
  - interview_scheduling
  - promotion_decisions
  - performance_review_ai
  - workforce_reduction_ai

protected_classes:          # Title VII §703 — the 5 protected classes
  - race
  - color
  - religion
  - sex
  - national_origin

# ============================================================
# RULES
# ============================================================

rules:

  # ----------------------------------------------------------
  # GROUP 1: DISPARATE IMPACT — NUMERIC (computable by engine)
  # ----------------------------------------------------------

  - id: RULE-EEOC-001
    name: Adverse Impact Ratio — 4/5ths Rule
    article: "EEOC Uniform Guidelines on Employee Selection Procedures §1607.4(D)"
    article_url: "https://www.ecfr.gov/current/title-29/subtitle-B/chapter-XIV/part-1607"
    type: numeric
    metric_id: adverse_impact_ratio       # adapter.py key: fairlearn demographic_parity_ratio
    stage: post_training
    severity: BLOCK
    description: >
      The 4/5ths rule: for every protected group, divide their
      selection rate by the highest-performing group's rate.
      If that ratio is below 0.80, the difference is "substantially
      different" — presumptive evidence of disparate impact under
      Title VII. This is the oldest and most legally established
      AI fairness threshold in existence (in law since 1978).
    threshold: 0.80
    operator: ">="
    threshold_provenance:
      source: >
        EEOC Uniform Guidelines on Employee Selection Procedures,
        29 CFR §1607.4(D) (1978) — regulatory law, not guidance,
        not affected by Trump EO 14179 (Jan 2025) which retracted
        EEOC's 2023 Technical Assistance on AI in Employment.
        The 4/5ths rule itself remains binding federal regulation.
      confidence: HIGH
      notes: >
        The 4/5ths rule is a rule of thumb, not an absolute bar.
        The EEOC acknowledges it may be inappropriate for very
        small sample sizes (n < 30 per group). BiasOps flags
        low-sample groups with a warning rather than a BLOCK.
        Passing 0.80 does not guarantee Title VII compliance —
        statistical significance tests may still indicate impact.
        NOTE: EEOC's 2023 Technical Assistance on AI in Employment
        was retracted January 2025 per EO 14179. This rule relies
        solely on 29 CFR §1607.4(D) (1978) which was NOT retracted.
      low_sample_warning_threshold: 30   # flag if n < 30 per group
    protected_classes:
      - race
      - sex
      - national_origin
      - color
      - religion
    computation: >
      adverse_impact_ratio = min_group_selection_rate / max_group_selection_rate
      Computed by fairlearn.metrics.demographic_parity_ratio()
    remediation: >
      Investigate which group has the lowest selection rate and why.
      Common causes: proxy variables encoding protected class
      (zip code, name, school), label bias in historical hiring data,
      feature weighting that disadvantages certain groups.
      Apply reweighing, equalized odds post-processing, or
      collect additional representative training data.
      Re-evaluate before next hiring cycle.

  - id: RULE-EEOC-002
    name: Demographic Parity Gap
    article: "EEOC Uniform Guidelines §1607.4(D); Title VII §703(a)(2)"
    article_url: "https://www.eeoc.gov/statutes/title-vii-civil-rights-act-1964"
    type: numeric
    metric_id: demographic_parity_gap     # adapter.py key: fairlearn MetricFrame.difference()
    stage: post_training
    severity: WARN
    description: >
      Absolute difference in selection rates between the highest
      and lowest performing protected groups. Complements the
      AIR ratio — a model can pass 0.80 AIR while still having
      a large absolute gap if baseline rates are high.
      Reported as WARN to flag for human review, not auto-block.
    threshold: 0.10
    operator: "<="
    threshold_provenance:
      source: "BiasOps default — Tier 4"
      confidence: LOW
      basis: >
        No regulatory source specifies an absolute gap threshold.
        0.10 is a conservative industry default: a 10-point
        absolute difference in selection rates is large enough
        to warrant human review regardless of whether the ratio
        passes the 4/5ths test. Pending EEOC further guidance.
    remediation: >
      Review model outputs by group. If demographic_parity_gap > 0.10
      even while AIR >= 0.80, investigate whether the gap reflects
      genuine qualification differences or proxy discrimination.
      Document the business justification per EEOC §1607.6.

  - id: RULE-EEOC-003
    name: Worst-Group Selection Rate Floor
    article: "Title VII §703(a)(2) — Disparate Impact"
    article_url: "https://www.eeoc.gov/statutes/title-vii-civil-rights-act-1964"
    type: numeric
    metric_id: min_group_selection_rate   # adapter.py key: min(per_group selection_rates)
    stage: post_training
    severity: BLOCK
    description: >
      The absolute selection rate of the worst-performing protected
      group must not fall below 10%. A model that selects fewer than
      1 in 10 candidates from any protected group creates severe
      adverse impact regardless of whether it passes the ratio test.
      This catches edge cases where all groups have low selection rates
      but one is dramatically lower.
    threshold: 0.10
    operator: ">="
    threshold_provenance:
      source: "BiasOps default — Tier 4"
      confidence: LOW
      basis: >
        Not directly specified in EEOC guidelines, which focus on
        the ratio rather than absolute floor. The 10% floor is a
        BiasOps conservative addition: below 10% selection rate
        for any group the model is effectively excluding that group
        from consideration, which is difficult to defend as
        "job related and consistent with business necessity"
        under the EEOC's §1607.15 validation requirements.
    remediation: >
      If any group's selection rate < 10%, the model is near-excluding
      that group. This requires immediate investigation and likely
      model retraining with fairness constraints before deployment.

  # ----------------------------------------------------------
  # GROUP 2: PROXY VARIABLES — ATTESTATION
  # (engine skips in MVP, generates checklist item)
  # ----------------------------------------------------------

  - id: RULE-EEOC-004
    name: Demographic Proxy Variables Absent
    article: "Title VII §703(a) — Proxies for Protected Class"
    article_url: "https://www.eeoc.gov/statutes/title-vii-civil-rights-act-1964"
    type: attestation
    stage: pre_training
    severity: BLOCK
    description: >
      Title VII prohibits using variables that function as proxies
      for protected characteristics even when the protected class
      itself is not used. Zip code proxies race. First and last name
      proxy national origin and religion. School name proxies race
      and socioeconomic status. The EEOC's May 2023 AI guidance
      explicitly flags proxy variable risk for algorithmic tools.
    what_biasops_checks:
      - no_known_proxies_present:
          columns_to_flag: [zip_code, postal_code, first_name, last_name,
                            full_name, school_name, university, college,
                            neighborhood, street_address]
      - correlation_check:
          max_correlation_with_protected: 0.70
          method: cramers_v_for_categorical
          note: >
            Any feature with Cramer's V > 0.70 with a protected
            attribute is a high-risk proxy. Flag for human review.
    threshold_provenance:
      source: >
        EEOC Technical Assistance on AI in Employment (May 2023);
        Title VII §703(a); OFCCP guidance on selection procedures
      confidence: HIGH
      notes: >
        The 0.70 correlation threshold is a BiasOps default.
        The EEOC does not specify a numeric correlation cutoff —
        the legal standard is whether a variable "tends to
        perpetuate the prior discriminatory practices."
    remediation: >
      Remove zip code, name, and school name from feature set.
      Run correlation analysis between remaining features and
      protected attributes. Drop or transform features with
      Cramer's V > 0.70. Document feature removal decisions
      in technical documentation per EEOC §1607.15.

  - id: RULE-EEOC-005
    name: Adverse Action Documentation
    article: "EEOC Uniform Guidelines §1607.9 — Use of Selection Procedures"
    article_url: "https://www.ecfr.gov/current/title-29/subtitle-B/chapter-XIV/part-1607/section-1607.9"
    type: attestation
    stage: pre_deployment
    severity: BLOCK
    description: >
      Employers must be able to produce records showing the basis
      for adverse employment decisions made using AI tools.
      If the AI model rejects a candidate, the employer must be
      able to explain why in terms that are job-related and
      consistent with business necessity (§1607.5).
    what_biasops_checks:
      - adverse_action_logging_enabled: true
      - rejection_reason_recorded: true
      - explanation_method_documented: true   # SHAP, LIME, or equivalent
    required_config_keys:
      - adverse_action_logging_enabled
      - explanation_method            # shap | lime | rule_based | other
      - rejection_reason_template
    threshold_provenance:
      source: >
        EEOC Uniform Guidelines §1607.9; Title VII record-keeping
        requirements; EEOC Charge Processing Manual
      confidence: HIGH
    remediation: >
      Implement logging of all adverse decisions with model-generated
      explanations. Integrate SHAP or LIME to produce feature-level
      explanations for each rejection. Retain records for minimum
      2 years per EEOC record-keeping requirements (29 CFR §1602).

  - id: RULE-EEOC-006
    name: Bias Audit Completed
    article: "NYC Local Law 144 (2023) — Automated Employment Decision Tools"
    article_url: "https://legistar.council.nyc.gov/LegislationDetail.aspx?ID=4344524"
    type: attestation
    stage: pre_deployment
    severity: BLOCK
    description: >
      NYC Local Law 144 requires employers using automated employment
      decision tools (AEDTs) in New York City to conduct an annual
      bias audit by an independent auditor before deployment, and
      to publish the summary results publicly. BiasOps verifies
      the audit has been commissioned and results are available.
      Even outside NYC, an independent bias audit is best practice
      and is increasingly expected by notified bodies and regulators.
    what_biasops_checks:
      - independent_bias_audit_completed: true
      - audit_results_published: true          # NYC LL144: results must be public
      - audit_date_within_12_months: true      # NYC LL144: annual requirement
      - auditor_independence_documented: true  # auditor must be independent of employer
    required_metadata_keys:
      - bias_audit_date
      - bias_audit_provider
      - bias_audit_results_url
    threshold_provenance:
      source: >
        NYC Local Law 144 (Int 1894-A, effective July 2023);
        NYC DCWP Final Rules on AEDTs (April 2023)
      confidence: HIGH
      notes: >
        NYC LL144 applies to employers and employment agencies
        using AEDTs for candidates or employees in NYC. It requires:
        (1) annual independent bias audit, (2) public results,
        (3) candidate notice at least 10 business days before use.
        BiasOps enforces the audit requirement for all hiring AI
        as best practice regardless of NYC jurisdiction.
    remediation: >
      Commission an independent bias audit from a qualified third
      party before deployment. Publish results at the URL specified
      in bias_audit_results_url. Notify candidates at least 10
      business days before using the AEDT. Repeat annually.

  - id: RULE-EEOC-007
    name: Candidate Notice of AI Use
    article: "NYC Local Law 144 §7-1703(b) — Notice Requirements"
    article_url: "https://legistar.council.nyc.gov/LegislationDetail.aspx?ID=4344524"
    type: attestation
    stage: pre_deployment
    severity: BLOCK
    description: >
      NYC Local Law 144 requires employers to notify candidates
      that an AEDT will be used in the selection process at least
      10 business days before using the tool. The notice must
      include the AEDT type and instructions for requesting an
      alternative selection process.
    what_biasops_checks:
      - candidate_notice_implemented: true
      - notice_timing_business_days: 10
      - alternative_process_available: true
    required_config_keys:
      - candidate_notice_implemented
      - notice_lead_time_business_days    # must be >= 10
      - alternative_selection_process_url
    threshold:
      notice_lead_time_business_days: 10
    threshold_provenance:
      source: "NYC Local Law 144 §7-1703(b); NYC DCWP Final Rules (April 2023)"
      confidence: HIGH
    condition: "jurisdiction_includes_nyc"
    remediation: >
      Implement candidate notice workflow at least 10 business days
      before AI screening begins. Include in the notice: what type
      of AEDT is used, what data it uses, and how to request an
      alternative assessment process. Document notice delivery.

  # ----------------------------------------------------------
  # GROUP 3: VALIDATION — ATTESTATION
  # ----------------------------------------------------------

  - id: RULE-EEOC-008
    name: Selection Procedure Validation
    article: "EEOC Uniform Guidelines §1607.5 — General Standards for Validity Studies"
    article_url: "https://www.ecfr.gov/current/title-29/subtitle-B/chapter-XIV/part-1607/section-1607.5"
    type: attestation
    stage: pre_deployment
    severity: WARN
    description: >
      EEOC §1607.5 requires that selection procedures showing
      adverse impact be validated as job-related and consistent
      with business necessity. Three validation strategies are
      recognised: criterion validity, content validity, and
      construct validity. For AI hiring models, criterion validity
      (correlation between model scores and job performance) is
      the most defensible. This rule is WARN not BLOCK because
      validation is a process over time, not a pre-deployment gate.
    what_biasops_checks:
      - validity_study_type documented
      - validity_study_completed: true
      - job_relatedness_documented: true
    required_metadata_keys:
      - validity_study_type       # criterion | content | construct
      - validity_study_date
      - job_relatedness_justification
    threshold_provenance:
      source: >
        EEOC Uniform Guidelines §1607.5(A)-(C) — Validity Studies;
        SIOP Principles for the Validation and Use of Personnel
        Selection Procedures (5th ed., 2018)
      confidence: HIGH
    remediation: >
      Commission a criterion validity study correlating model
      selection scores with actual job performance metrics.
      Document job-relatedness justification. Retain validity
      evidence per EEOC §1607.15(A)(1) record-keeping requirements.

  - id: RULE-EEOC-009
    name: Protected Class Analysis Report
    article: "EEOC Uniform Guidelines §1607.4(A) — Determination of Adverse Impact"
    article_url: "https://www.ecfr.gov/current/title-29/subtitle-B/chapter-XIV/part-1607/section-1607.4"
    type: attestation
    stage: post_training
    severity: BLOCK
    description: >
      Before deployment, a formal adverse impact analysis must be
      conducted and documented across all five Title VII protected
      classes. This is distinct from the automated AIR computation
      (RULE-EEOC-001) — it requires a human-reviewed report that
      covers edge cases, sub-group intersections, and contextual
      factors the automated check cannot detect.
    what_biasops_checks:
      - protected_class_analysis_completed: true
      - all_five_classes_covered: true        # race, color, religion, sex, national_origin
      - intersectional_analysis_documented: true
      - human_reviewer_sign_off: true
    required_metadata_keys:
      - protected_class_analysis_date
      - protected_class_analysis_reviewer
      - intersectional_groups_analysed
    threshold_provenance:
      source: >
        EEOC Uniform Guidelines §1607.4(A)-(B);
        EEOC Q&A on Uniform Guidelines (1979) — Question 14
      confidence: HIGH
    remediation: >
      Produce a written adverse impact analysis report covering
      all five Title VII protected classes plus key intersectional
      groups (e.g. Black women, older Hispanic men). Have a senior
      HR or legal reviewer sign off before deployment. Retain for
      minimum 2 years per §1607.15 record-keeping.

# ============================================================
# BIAS MONITORING BENCHMARKS
# Connected to specific rules
# ============================================================

bias_monitoring:
  benchmarks:
    - name: 4/5ths Rule (EEOC Uniform Guidelines)
      satisfies_rule: RULE-EEOC-001
      metric_id: adverse_impact_ratio
      fail_threshold: 0.80
      operator: "<"
      severity: BLOCK
      source: "EEOC 29 CFR §1607.4(D) (1978)"

    - name: Demographic Parity Gap
      satisfies_rule: RULE-EEOC-002
      metric_id: demographic_parity_gap
      fail_threshold: 0.10
      operator: ">"
      severity: WARN
      source: "BiasOps default — Tier 4"

    - name: NYC LL144 Annual Bias Audit
      satisfies_rule: RULE-EEOC-006
      type: attestation
      frequency: annual
      source: "NYC Local Law 144 (2023)"

# ============================================================
# REMEDIATION MAP
# Every rule ID maps to its specific fix — no flat list
# ============================================================

remediation_map:
  RULE-EEOC-001: "Investigate group selection rate disparity; apply reweighing or equalized odds post-processing"
  RULE-EEOC-002: "Reduce demographic_parity_gap through fairness constraints or data rebalancing"
  RULE-EEOC-003: "Worst-group selection rate < 10% — model near-excluding group; retrain with fairness constraints"
  RULE-EEOC-004: "Remove proxy variables (zip, name, school); check feature correlation with protected attributes"
  RULE-EEOC-005: "Implement adverse action logging with SHAP/LIME explanations per rejection"
  RULE-EEOC-006: "Commission independent bias audit; publish results; audit annually"
  RULE-EEOC-007: "Implement 10-business-day candidate notice with alternative process option (NYC LL144)"
  RULE-EEOC-008: "Commission criterion validity study; document job-relatedness justification"
  RULE-EEOC-009: "Produce human-reviewed adverse impact analysis across all 5 Title VII protected classes"

# ============================================================
# CROSS-POLICY REFERENCES
# Rules in this policy that overlap with EU AI Act policy
# ============================================================

cross_policy_overlap:
  - this_rule: RULE-EEOC-001
    eu_ai_act_rule: RULE-005
    overlap: >
      Both rules compute adverse_impact_ratio against threshold 0.80.
      In a combined EU+US hiring audit, one metric computation
      satisfies both rules. The engine deduplicates.

  - this_rule: RULE-EEOC-004
    eu_ai_act_rule: RULE-003
    overlap: >
      Both rules address data governance and proxy variable risk.
      EU AI Act RULE-003 requires a data governance policy;
      EEOC RULE-EEOC-004 requires proxy variable removal.
      Different artifacts satisfy each — they do not deduplicate.

